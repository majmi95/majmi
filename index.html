<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قرعة الفرق ⚽</title>

<style>

body{
font-family: Arial;
background:url("https://images.unsplash.com/photo-1508098682722-e99c43a406b2") no-repeat center;
background-size:cover;
color:white;
text-align:center;
padding:30px;
}

.container{
background:rgba(0,0,0,0.7);
padding:25px;
border-radius:15px;
max-width:600px;
margin:auto;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
width:80%;
}

button{
padding:12px 20px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#00e676;
}

.team{
background:rgba(255,255,255,0.1);
margin:10px;
padding:12px;
border-radius:10px;
font-size:18px;
}

.reserve{
color:yellow;
font-weight:bold;
font-size:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>⚽ قرعة فرق الاستراحة</h1>

<div id="step1">

<p>ادخل عدد اللاعبين</p>

<input type="number" id="playersCount" placeholder="عدد اللاعبين">

<br>

<button onclick="createInputs()">التالي</button>

</div>


<div id="step2" style="display:none">

<h3>ادخل أسماء اللاعبين</h3>

<div id="playersInputs"></div>

<button onclick="drawTeams()">🎲 سوِّ قرعة الفرق</button>

</div>


<div id="result"></div>

</div>

<audio id="whistle">
<source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<script>

function createInputs(){

let count = document.getElementById("playersCount").value;

let container = document.getElementById("playersInputs");

container.innerHTML="";

for(let i=1;i<=count;i++){

container.innerHTML+=`
<input placeholder="اسم اللاعب ${i}">
`;

}

document.getElementById("step2").style.display="block";

}


function shuffle(array){

for (let i = array.length - 1; i > 0; i--) {

const j = Math.floor(Math.random() * (i + 1));

[array[i], array[j]] = [array[j], array[i]];

}

return array;

}


function drawTeams(){

document.getElementById("whistle").play();

let inputs=document.querySelectorAll("#playersInputs input");

let players=[];

inputs.forEach(i=>{

if(i.value!="") players.push(i.value);

});

players=shuffle(players);

let result=document.getElementById("result");

result.innerHTML="<h2>🏆 الفرق</h2>";

let teamNumber=1;

let reserve=null;

if(players.length%2==1){

reserve=players.pop();

}

for(let i=0;i<players.length;i+=2){

result.innerHTML+=`

<div class="team">

⚽ الفريق ${teamNumber}<br>

${players[i]} + ${players[i+1]}

</div>

`;

teamNumber++;

}

if(reserve){

result.innerHTML+=`

<div class="reserve">

🚨 اللاعب الاحتياط: ${reserve}

</div>

`;

}

}

</script>

</body>
</html>
